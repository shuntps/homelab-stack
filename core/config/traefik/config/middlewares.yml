http:
  middlewares:
    security-headers:
      headers:
        sslProxyHeaders:
          X-Forwarded-Proto: "https"
        stsSeconds: 31536000
        stsIncludeSubdomains: true
        stsPreload: false
        forceSTSHeader: true
        frameDeny: true
        contentTypeNosniff: true
        referrerPolicy: "strict-origin-when-cross-origin"
        permissionsPolicy: "accelerometer=(), camera=(), microphone=(), geolocation=(), gyroscope=(), magnetometer=(), usb=(), payment=(), picture-in-picture=()"
        customResponseHeaders:
          Server: ""
          X-Powered-By: ""
          X-Robots-Tag: "noindex,nofollow,nosnippet,noarchive"
          X-XSS-Protection: "0"

    # Use when the upstream app already owns CSP, frame, referrer, and permissions headers.
    upstream-app-headers:
      headers:
        sslProxyHeaders:
          X-Forwarded-Proto: "https"
        stsSeconds: 31536000
        stsIncludeSubdomains: true
        stsPreload: false
        forceSTSHeader: true
        customResponseHeaders:
          Server: ""
          X-Powered-By: ""
          X-Robots-Tag: "noindex,nofollow,nosnippet,noarchive"

    authelia:
      forwardAuth:
        address: 'http://authelia:9091/api/authz/forward-auth?rd=https://{{ env "AUTH_SUBDOMAIN" }}.{{ env "DOMAIN" }}/'
        trustForwardHeader: true
        maxResponseBodySize: 8192
        authResponseHeaders:
          - "Remote-User"
          - "Remote-Groups"
          - "Remote-Name"
          - "Remote-Email"

    default-chain:
      chain:
        middlewares:
          - "security-headers"

    protected-chain:
      chain:
        middlewares:
          - "authelia"
          - "security-headers"

    upstream-app-chain:
      chain:
        middlewares:
          - "upstream-app-headers"

    upstream-app-protected-chain:
      chain:
        middlewares:
          - "authelia"
          - "upstream-app-headers"

    # Vaultwarden requires an updated CSP for inline scripts if they are executed.
    vaultwarden-custom-headers:
      headers:
        customResponseHeaders:
          Permissions-Policy: "accelerometer=(), autoplay=(), camera=(), display-capture=(), encrypted-media=(), fullscreen=(), geolocation=(), gyroscope=(), keyboard-map=(), magnetometer=(), microphone=(), midi=(), payment=(), picture-in-picture=(), screen-wake-lock=(), sync-xhr=(), usb=(), web-share=(), xr-spatial-tracking=()"
          Content-Security-Policy: "default-src 'self'; script-src 'self' 'wasm-unsafe-eval' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https://haveibeenpwned.com https://*.githubusercontent.com; child-src 'self' https://app.simplelogin.io https://app.anonaddy.com https://relay.firefox.com https://api.fastmail.com https://quack.duckduckgo.com; frame-src 'self' https://app.simplelogin.io https://app.anonaddy.com https://relay.firefox.com https://api.fastmail.com https://quack.duckduckgo.com; connect-src 'self' https://api.pwnedpasswords.com https://api.2fa.directory; object-src 'self';"

    rate-limit:
      rateLimit:
        average: 100
        burst: 50

    # Synology requires broader CSP allowances for its UI assets.
    synology-csp:
      headers:
        customResponseHeaders:
          Content-Security-Policy: "base-uri 'self'; connect-src data: ws: wss: http: https:; default-src 'self' 'unsafe-eval' data: blob: https://*.synology.com https://www.synology.cn/ https://help.synology.cn/; font-src 'self' data: https://*.googleapis.com https://*.gstatic.com; form-action 'self'; frame-ancestors 'self'; frame-src 'self' data: blob: https://*.synology.com https://*.synology.cn; img-src 'self' data: blob: https://*.google.com https://*.googleapis.com http://*.googlecode.com https://*.gstatic.com https://global.download.synology.com; media-src 'self' data: about: https://*.synology.com https://help.synology.cn; script-src 'self' 'unsafe-eval' data: blob: https://maps.google.com https://ajax.googleapis.com https://help.synology.com https://help.synology.cn; style-src 'self' 'unsafe-inline' https://*.googleapis.com;"

    # Pi-hole uses a small inline runtime script in the admin UI.
    pihole-csp:
      headers:
        customResponseHeaders:
          Content-Security-Policy: "default-src 'none'; connect-src 'self'; font-src 'self'; frame-ancestors 'none'; img-src 'self'; manifest-src 'self'; object-src 'none'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; form-action 'self'; base-uri 'self';"

    pihole-chain:
      chain:
        middlewares:
          - "authelia"
          - "security-headers"
          - "pihole-csp"
