http:
  middlewares:
    security-headers:
      headers:
        sslRedirect: true
        sslProxyHeaders:
          X-Forwarded-Proto: "https"
        stsSeconds: 31536000
        stsIncludeSubdomains: true
        stsPreload: false
        forceSTSHeader: true
        frameDeny: true
        contentTypeNosniff: true
        referrerPolicy: "strict-origin-when-cross-origin"
        permissionsPolicy: "accelerometer=(), camera=(), microphone=(), geolocation=(), gyroscope=(), magnetometer=(), usb=(), payment=(), picture-in-picture=()"
        customResponseHeaders:
          Server: ""
          X-Powered-By: ""
          X-Robots-Tag: "noindex,nofollow,nosnippet,noarchive"
          X-XSS-Protection: "0"

    # Use when the upstream app already owns CSP, frame, referrer, and permissions headers.
    upstream-app-headers:
      headers:
        sslRedirect: true
        sslProxyHeaders:
          X-Forwarded-Proto: "https"
        stsSeconds: 31536000
        stsIncludeSubdomains: true
        stsPreload: false
        forceSTSHeader: true
        customResponseHeaders:
          Server: ""
          X-Powered-By: ""
          X-Robots-Tag: "noindex,nofollow,nosnippet,noarchive"

    authelia:
      forwardAuth:
        address: 'http://authelia:9091/api/authz/forward-auth?rd=https://{{ env "AUTH_SUBDOMAIN" }}.{{ env "DOMAIN" }}/'
        trustForwardHeader: true
        maxResponseBodySize: 8192
        authResponseHeaders:
          - "Remote-User"
          - "Remote-Groups"
          - "Remote-Name"
          - "Remote-Email"

    default-chain:
      chain:
        middlewares:
          - "security-headers"

    protected-chain:
      chain:
        middlewares:
          - "authelia"
          - "security-headers"

    upstream-app-chain:
      chain:
        middlewares:
          - "upstream-app-headers"

    upstream-app-protected-chain:
      chain:
        middlewares:
          - "authelia"
          - "upstream-app-headers"

    rate-limit:
      rateLimit:
        average: 100
        burst: 50

    # Synology requires broader CSP allowances for its UI assets.
    synology-csp:
      headers:
        customResponseHeaders:
          Content-Security-Policy: "base-uri 'self'; connect-src data: ws: wss: http: https:; default-src 'self' 'unsafe-eval' data: blob: https://*.synology.com https://www.synology.cn/ https://help.synology.cn/; font-src 'self' data: https://*.googleapis.com https://*.gstatic.com; form-action 'self'; frame-ancestors 'self'; frame-src 'self' data: blob: https://*.synology.com https://*.synology.cn; img-src 'self' data: blob: https://*.google.com https://*.googleapis.com http://*.googlecode.com https://*.gstatic.com https://global.download.synology.com; media-src 'self' data: about: https://*.synology.com https://help.synology.cn; script-src 'self' 'unsafe-eval' data: blob: https://maps.google.com https://ajax.googleapis.com https://help.synology.com https://help.synology.cn https://static.cloudflareinsights.com https://cloudflareinsights.com; style-src 'self' 'unsafe-inline' https://*.googleapis.com;"

    # Portainer requires service-specific CSP allowances.
    portainer-csp:
      headers:
        customResponseHeaders:
          Content-Security-Policy: "script-src 'self' cdn.matomo.cloud js.hsforms.net https://www.google.com/recaptcha/ https://www.gstatic.com/recaptcha/ https://static.cloudflareinsights.com https://cloudflareinsights.com; connect-src 'self' https://cloudflareinsights.com; object-src 'none'; frame-ancestors 'none'; frame-src https://www.google.com/recaptcha/ https://www.gstatic.com/recaptcha/"
          Permissions-Policy: "accelerometer=(), camera=(), microphone=(), geolocation=(), gyroscope=(), magnetometer=(), usb=(), payment=(), picture-in-picture=()"

    # Pi-hole ships a strict CSP; this keeps it strict while allowing Cloudflare Insights.
    pihole-csp:
      headers:
        sslRedirect: true
        sslProxyHeaders:
          X-Forwarded-Proto: "https"
        stsSeconds: 31536000
        stsIncludeSubdomains: true
        stsPreload: false
        forceSTSHeader: true
        frameDeny: true
        contentTypeNosniff: true
        referrerPolicy: "strict-origin-when-cross-origin"
        permissionsPolicy: "accelerometer=(), camera=(), microphone=(), geolocation=(), gyroscope=(), magnetometer=(), usb=(), payment=(), picture-in-picture=()"
        customResponseHeaders:
          Server: ""
          X-Powered-By: ""
          X-Robots-Tag: "noindex,nofollow,nosnippet,noarchive"
          X-XSS-Protection: "0"
          Content-Security-Policy: "default-src 'none'; connect-src 'self' https://cloudflareinsights.com; font-src 'self'; frame-ancestors 'none'; img-src 'self'; manifest-src 'self'; script-src 'self' https://static.cloudflareinsights.com; style-src 'self' 'unsafe-inline'; form-action 'self'; object-src 'none'; base-uri 'self';"

    pihole-chain:
      chain:
        middlewares:
          - "authelia"
          - "pihole-csp"
