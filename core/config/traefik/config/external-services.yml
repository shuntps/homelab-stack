http:
  routers:
    portainer:
      rule: 'Host(`{{ env "PORTAINER_SUBDOMAIN" }}.{{ env "DOMAIN" }}`)'
      entryPoints:
        - "web"
      service: "portainer-service"
      middlewares:
        - "protected-chain"

    server:
      rule: 'Host(`{{ env "SERVER_SUBDOMAIN" }}.{{ env "DOMAIN" }}`)'
      entryPoints:
        - "web"
      service: "server-service"
      middlewares:
        - "protected-chain"

    # Browser web app manifests cannot complete an authentication redirect.
    server-manifest:
      rule: 'Host(`{{ env "SERVER_SUBDOMAIN" }}.{{ env "DOMAIN" }}`) && Path(`/manifest.json`)'
      entryPoints:
        - "web"
      priority: 100
      service: "server-service"
      middlewares:
        - "default-chain"

    nas:
      rule: 'Host(`{{ env "NAS_SUBDOMAIN" }}.{{ env "DOMAIN" }}`)'
      entryPoints:
        - "web"
      service: "nas-service"
      middlewares:
        - "protected-chain"
        - "synology-csp"

  services:
    portainer-service:
      loadBalancer:
        passHostHeader: true
        servers:
          - url: '{{ env "TRAEFIK_EXTERNAL_PORTAINER_URL" }}'

    server-service:
      loadBalancer:
        passHostHeader: true
        servers:
          - url: '{{ env "TRAEFIK_EXTERNAL_SERVER_URL" }}'

    nas-service:
      loadBalancer:
        passHostHeader: true
        servers:
          - url: '{{ env "TRAEFIK_EXTERNAL_NAS_URL" }}'
