---
# Example users only; replace before exposing Authelia.
# Generate Argon2id hashes with: docker run --rm authelia/authelia:4.39.15 authelia crypto hash generate argon2 --password '<PASSWORD>'

users:
  admin:
    disabled: false
    displayname: "Administrator"
    password: "$argon2id$v=19$m=65536,t=3,p=4$VGbTbPiw2VAYuk2fr3GeMA$9V6rVKNVsNrM3I+K4eilI8RfEgfwxsSzDz7CUfGy2No"
    email: "admin@example.com"
    groups:
      - "admins"

  user:
    disabled: false
    displayname: "User"
    password: "$argon2id$v=19$m=65536,t=3,p=4$VGbTbPiw2VAYuk2fr3GeMA$9V6rVKNVsNrM3I+K4eilI8RfEgfwxsSzDz7CUfGy2No"
    email: "user@example.com"
    groups:
      - "users"
